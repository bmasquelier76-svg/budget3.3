    <!-- ERREUR 3 CORRIGÉE : <h1> et <p> retirés du <head> (ils sont maintenant dans le <body>) -->
    <style>
        
    :root {
    --primary: #990000;
    --text: #f8fafc;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
}

body {
    font-family: 'Patrick Hand', cursive;
    color: var(--text);
    background: #000;
    overflow-x: hidden;
}

/* ================= FOND ================= */

#bg-panorama {
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    width: 300vw;

    background-image: url("arriereplan.PNG");
    background-repeat: no-repeat;
    background-size: cover;

    background-position: left center;

    z-index: -2;
    transition: transform 0.35s ease;
}


#bg-fog {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background: radial-gradient(circle at 20% 30%, rgba(255,0,0,0.08), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(120,0,0,0.10), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(0,0,0,0.6), transparent 60%);
    animation: fogMove 12s ease-in-out infinite alternate;
}

@keyframes fogMove {
    0% { transform: translateX(-10px); }
    100% { transform: translateX(10px); }
}

/* ================= APP ================= */

.app-container {
    width: 100%;
    padding: 20px 15px 140px;
}

/* ================= BULLES ================= */

.bubbles-grid .bubble {
    width: 100px !important;
    height: 90px !important; 
    background-color: rgba(0, 0, 0, 0.7) !important;
    border: 1px solid rgba(255, 69, 0, 0.4) !important;
    border-radius: 12px !important;
    display: flex !important;
    flex-direction: column !important;
    justify-content: center !important;
    align-items: center !important;
    padding: 10px !important;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6) !important;
}

.bubbles-grid .bubble-label {
    font-size: 14px !important; 
    color: #ff4500 !important;
    text-transform: uppercase !important;
    font-family: 'Cinzel', serif !important;
    margin-bottom: 5px !important;
    letter-spacing: 1px;
}

.bubbles-grid .bubble-val {
    font-size: 24px !important; 
    font-weight: 900 !important;
    color: #ffffff !important;
    text-shadow: 2px 2px 4px #000 !important;
    font-family: 'Bangers', cursive !important;
    width: 100%;
    text-align: center;
    white-space: nowrap;
}

/* ================= SWIPE MOBILE ================= */

#swipe-wrapper {
    overflow: hidden;
}

#swipe-track {
    display: flex;
    width: 300%;
    transform: translateX(-33.33%);
    transition: transform 0.35s ease;
}

.view-pane {
    width: 33.33%;
    padding: 0 5px;
}

/* ================= NAV ================= */

.nav-bar {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.95);
    border-top: 2px solid var(--primary);
    display: flex;
}
.section-title {
    display: inline-block;
    padding: 6px 14px;
    margin-bottom: 10px;

    background: rgba(153, 0, 0, 0.20);
    border: 1px solid rgba(153, 0, 0, 0.25);

    border-radius: 999px;

    color: #aaa;
    font-family: Cinzel, serif;
    font-size: 16px;
    letter-spacing: 2px;

    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);

    text-align: center;
}
.cat-card {
    background: rgba(153, 0, 0, 0.06);
    border: 1px solid rgba(153, 0, 0, 0.15);

    border-radius: 16px;

    margin-bottom: 12px;
    padding: 12px;

    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);

    box-shadow: 
        0 0 10px rgba(153, 0, 0, 0.08),
        inset 0 0 10px rgba(0,0,0,0.4);

    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.cat-card:active {
    transform: scale(0.98);
}

.cat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;

    font-family: Cinzel, serif;
    font-size: 13px;
    color: #ddd;

    margin-bottom: 8px;
    letter-spacing: 1px;
}
.cat-card:hover {
    box-shadow: 
        0 0 18px rgba(153, 0, 0, 0.18),
        inset 0 0 12px rgba(0,0,0,0.5);
}
.cat-icon {
    width: 36px;
    height: 36px;
    object-fit: contain;

    filter: drop-shadow(0 0 6px rgba(153,0,0,0.7));
}
.btn-glass {
    padding: 6px 10px;
    font-size: 13px;

    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(153,0,0,0.35);

    backdrop-filter: blur(6px);

    color: #ddd;

    box-shadow: 
        0 0 10px rgba(153,0,0,0.2),
        inset 0 0 10px rgba(0,0,0,0.6);

    transition: all 0.2s ease;
}

.btn-glass {
    animation: pulseBtn 4s ease-in-out infinite;
}

@keyframes pulseBtn {
    0%,100% { box-shadow: 0 0 10px rgba(153,0,0,0.2); }
    50% { box-shadow: 0 0 20px rgba(153,0,0,0.5); }
}

.btn-glass:hover {
    background: rgba(153,0,0,0.25);
    box-shadow: 
        0 0 15px rgba(153,0,0,0.5),
        inset 0 0 10px rgba(0,0,0,0.8);

    transform: translateY(-1px);
}

.btn-glass:active {
    transform: scale(0.97);
}
.floating-actions {
    display: flex;
    justify-content: center;
    gap: 12px;

    margin: 10px 0 15px;
}

.floating-btn {
    width: 55px;
    height: 55px;

    border-radius: 50%;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 22px;

    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(153,0,0,0.4);

    backdrop-filter: blur(6px);

    box-shadow:
        0 0 15px rgba(153,0,0,0.3),
        inset 0 0 10px rgba(0,0,0,0.7);

    transition: all 0.2s ease;
}
.floating-btn:hover {
    transform: scale(1.1);
    box-shadow:
        0 0 25px rgba(255,0,0,0.6),
        inset 0 0 12px rgba(0,0,0,0.9);
}

.floating-btn:active {
    transform: scale(0.95);
}
.floating-btn {
    animation: floatPulse 4s ease-in-out infinite;
}

@keyframes floatPulse {
    0%,100% {
        box-shadow: 0 0 15px rgba(153,0,0,0.3);
    }
    50% {
        box-shadow: 0 0 30px rgba(153,0,0,0.6);
    }
}
.btn-floating {
    padding: 10px 16px;
    border-radius: 12px;

    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(153,0,0,0.5);

    color: #eee;
    font-family: Cinzel, serif;
    font-size: 14px;

    backdrop-filter: blur(6px);

    box-shadow:
        0 0 12px rgba(153,0,0,0.3),
        inset 0 0 10px rgba(0,0,0,0.7);

    transition: all 0.2s ease;
}

.btn-floating:hover {
    background: rgba(153,0,0,0.25);
    transform: translateY(-2px);
}

.btn-floating:active {
    transform: scale(0.95);
}

.btn-floating, .btn-sang, .btn-primary {
    position: relative !important;
    overflow: hidden !important;
    background-image: url("ecrit.gif") !important; 
    background-size: cover !important;
    background-position: center !important;
    
    filter: brightness(1.4) contrast(1.2) saturate(1.3);
    box-shadow: 0 0 15px rgba(153, 0, 0, 0.7) !important;
    border: 1px solid #ff4500 !important;
    
    text-shadow: 2px 2px 4px #000, 0px 0px 10px #000 !important;
    font-weight: bold !important;
    color: #fff !important;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
}

.btn-floating:active, .btn-sang:active {
    transform: scale(0.95);
    filter: brightness(1.8);
}

.btn-floating span, .btn-sang span {
    position: relative;
    z-index: 2;
}

.top-bar .bubble.bubble-butin {
    background: transparent url('parchemin.png') no-repeat center !important;
    background-size: contain !important;
    border: none !important;
    box-shadow: none !important;
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    outline: none !important;

    width: 340px !important; 
    height: 180px !important;
    display: flex !important;
    flex-direction: column !important;
    justify-content: center !important;
    align-items: center !important;
    
    filter: drop-shadow(12px 12px 15px rgba(0,0,0,0.9)) !important;
    transform: rotate(-2deg) !important;
    margin: 0 auto !important;
    padding: 20px !important;
}


#labelBudgetZen {
    font-family: 'Bangers', cursive !important;
    font-size: 22px !important;
    color: #ffffff !important;
    text-shadow: 2px 2px 0px #000 !important;
    text-transform: uppercase !important;
    display: block !important;
}

.sanctuarum-textura {
    font-family: 'Pirata One', cursive !important;
    font-size: 40px !important;
    color: #ff4500 !important;
    margin-bottom: 0 !important;
}

/* --- FORCE L'AFFICHAGE ET DESCEND LE TITRE --- */
.sanctuarum-textura {
    display: block !important; /* On s'assure qu'il n'est pas caché */
    visibility: visible !important;
    position: relative !important;
    top: 20px !important; /* On le descend de 20px pour qu'il ne soit pas collé en haut */
    left: 15px !important; /* On le décolle un peu du bord gauche */
    z-index: 9999 !important; /* Il passe devant tout le monde */

    <script>
const KEY = 'sanct_v4_triple';

const catConfig = { m:'Maison', c:'Credits', v:'Transport', a:'Abos', s:'Sante', o:'Autres' };
const varCats = ['Alimentaire', 'Carburants', 'Loisirs', 'Cadeaux', 'Equipement'];

let store = JSON.parse(localStorage.getItem(KEY)) || {
    solde: 3000,
    transactions: [],
    fixes: Object.keys(catConfig).map(id => ({id, items:[]})),
    variables: varCats.map(name => ({name, items:[]}))
};

const IS_PC  = () => window.innerWidth >= 768;
let currentPage = 1;

const track   = document.getElementById('swipe-track');
const wrapper = document.getElementById('swipe-wrapper');
const bg      = document.getElementById('bg-panorama');

function nav(idx) {
    currentPage = idx;
    track.style.transition = 'transform 0.35s ease';
    track.style.transform  = `translateX(${idx * -33.33}%)`;
    if (!IS_PC()) bg.style.transform = `translateX(${-idx * 100}vw)`;

    document.querySelectorAll('.nav-btn')
        .forEach((b,i) => b.classList.toggle('active', i===idx));
}

/* ================= SWIPE ================= */

let touchStartX=0, touchStartY=0, isDragging=false;

wrapper.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    isDragging  = false;
    track.style.transition = 'none';
    if (!IS_PC()) bg.style.transition = 'none';
}, {passive:true});

wrapper.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    if (!isDragging && Math.abs(dy) > Math.abs(dx)) return;
    isDragging = true;
    e.preventDefault();
    track.style.transform = `translateX(calc(${currentPage * -33.33}% + ${dx}px))`;
    if (!IS_PC()) bg.style.transform = `translateX(calc(${currentPage * -100}vw + ${dx}px))`;
}, {passive:false});

wrapper.addEventListener('touchend', e => {
    if (!isDragging) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (dx < -50 && currentPage < 2) currentPage++;
    else if (dx > 50 && currentPage > 0) currentPage--;
    nav(currentPage);
}, {passive:true});

/* ================= CALCUL ================= */

function update() {
    localStorage.setItem(KEY, JSON.stringify(store));

    let tf=0,pf=0,tv=0,pv=0;

    store.fixes.forEach(c=>c.items.forEach(it=>{
        tf+=it.amt;
        if(it.done) pf+=it.amt;
    }));

    store.variables.forEach(v=>v.items.forEach(it=>{
        tv+=it.amt;
        if(it.done) pv+=it.amt;
    }));

    const tCB   = store.transactions.filter(t=>t.type!=='differe').reduce((s,t)=>s+t.amt,0);
    const tDiff = store.transactions.filter(t=>t.type==='differe').reduce((s,t)=>s+t.amt,0);

    document.getElementById('sPrev').textContent    = (store.solde-tf-tv).toFixed(2)+'€';
    document.getElementById('sReel').textContent    = (store.solde-pf-pv-tCB).toFixed(2)+'€';
    document.getElementById('sEncours').textContent = tDiff.toFixed(2)+'€';
    document.getElementById('sSolde').textContent   = store.solde.toFixed(2)+'€';
// --- ANIMATION JS RADICALE ---
const gauge = document.getElementById('bloodFill');

if (gauge) {
const libre = store.solde - pf - pv - tCB;

// 👉 pourcentage du restant (réel)
let pct = store.solde > 0 ? (libre / store.solde) * 100 : 0;

// clamp sécurité
pct = Math.max(0, Math.min(100, pct));
const r = Math.round(255 * (1 - pct / 100)); // rouge augmente quand ça baisse
const g = Math.round(255 * (pct / 100));     // vert diminue quand ça baisse

const color = `rgb(${r}, ${g}, 0)`;
// seuil critique
if (pct <= 10) {
    gauge.classList.add("gauge-danger");
} else {
    gauge.classList.remove("gauge-danger");
}

gauge.style.background = `linear-gradient(to top, ${color}, rgba(0,0,0,0.3))`;

gauge.style.height = pct + "%";
}
}


/* ================= SOLDE ================= */

function editSolde() {
    document.getElementById('butinModal').style.display='flex';
    document.getElementById('butinInput').value=store.solde;
}

function confirmButin() {
    const v=parseFloat(document.getElementById('butinInput').value);
    if(!isNaN(v)){
        store.solde=v;
        render();
    }
    document.getElementById('butinModal').style.display='none';
}

/* ================= RENDER ================= */

function render() {

    const gridF=document.getElementById('catsGrid');
    gridF.innerHTML='';

    store.fixes.forEach(cat=>{
        const div=document.createElement('div');
        div.className='cat-card';

        div.innerHTML=`
        <div class="cat-header">
            <span>${catConfig[cat.id]}</span>
            <span>${cat.items.reduce((s,i)=>s+i.amt,0)}€</span>
        </div>

        ${cat.items.map((it,i)=>`
            <div class="item-row">
                <input type="checkbox" ${it.done?'checked':''} onclick="toggleItem('fix','${cat.id}',${i})">
                <span>${it.l}</span>
                <span>${it.amt}€</span>
                <button onclick="delItem('fix','${cat.id}',${i})">×</button>
            </div>
        `).join('')}

        <div style="display:flex;gap:5px;">
            <input type="text" id="fi-l-${cat.id}" placeholder="Nom">
            <input type="number" id="fi-a-${cat.id}" placeholder="€">
  <button class="btn-plus" onclick="addItem('fix','${cat.id}')">
    <video src="plus.mp4" autoplay loop muted playsinline class="btn-plus-video"></video>
    <span>+</span>
</button>
        </div>`;

        gridF.appendChild(div);
    });

    const gridV=document.getElementById('varsGrid');
    gridV.innerHTML='';

    store.variables.forEach((cat,idx)=>{
        const div=document.createElement('div');
        div.className='cat-card';

        div.innerHTML=`
        <div class="cat-header">
            <span>${cat.name}</span>
            <span>${cat.items.reduce((s,i)=>s+i.amt,0)}€</span>
        </div>

        ${cat.items.map((it,i)=>`
            <div class="item-row">
                <input type="checkbox" ${it.done?'checked':''} onclick="toggleItem('var',${idx},${i})">
                <span>${it.l}</span>
                <span>${it.amt}€</span>
                <button onclick="delItem('var',${idx},${i})">×</button>
            </div>
        `).join('')}

        <div style="display:flex;gap:5px;">
            <input type="text" id="vi-l-${idx}" placeholder="Objet">
            <input type="number" id="vi-a-${idx}" placeholder="€">
  <button class="btn-plus" onclick="addItem('var',${idx})">
    <video src="plus.mp4" autoplay loop muted playsinline class="btn-plus-video"></video>
    <span>+</span>
</button>
        </div>`;

        gridV.appendChild(div);
    });

    renderTx();
    update();
}

/* ================= ACTIONS ================= */

function addItem(type,id){
    const l=document.getElementById(`${type==='fix'?'fi':'vi'}-l-${id}`);
    const a=document.getElementById(`${type==='fix'?'fi':'vi'}-a-${id}`);
    if(!l.value||!a.value)return;

    const list=type==='fix'
        ? store.fixes.find(c=>c.id===id).items
        : store.variables[id].items;

    list.push({l:l.value,amt:parseFloat(a.value),done:false});
    l.value=''; a.value='';
    render();
}

function toggleItem(type,id,i){
    const list=type==='fix'
        ? store.fixes.find(c=>c.id===id).items
        : store.variables[id].items;

    list[i].done=!list[i].done;
    render();
}

function delItem(type,id,i){
    const list=type==='fix'
        ? store.fixes.find(c=>c.id===id).items
        : store.variables[id].items;

    list.splice(i,1);
    render();
}

/* ================= TRANSACTIONS ================= */

function addTx(){
    const l=document.getElementById('txLib');
    const a=document.getElementById('txAmt');
    const t=document.querySelector('input[name="txType"]:checked').value;

    if(l.value&&a.value){
        store.transactions.unshift({
            lib:l.value,
            amt:parseFloat(a.value),
            type:t
        });
        l.value=''; a.value='';
        render();
    }
}

function renderTx(){
    document.getElementById('txList').innerHTML=
        store.transactions.map((t,i)=>`
        <div class="item-row">
            <div>${t.lib} (${t.type})</div>
            <div>-${t.amt}€ 
                <button onclick="delTx(${i})">×</button>
            </div>
        </div>`).join('');
}

function delTx(i){
    store.transactions.splice(i,1);
    render();
}

/* ================= INIT ================= */

document.getElementById('sSolde').addEventListener('click', editSolde);

render();
function grandRituel() {
    if (!confirm("Lancer le Grand Rituel ?")) return;

    // Active loader + coupe animations
    document.getElementById('ritualLoader').style.display = 'flex';
    document.body.classList.add('no-anim');

    setTimeout(() => {

        const resteLibre = parseFloat(document.getElementById('sReel').textContent);
        store.solde = resteLibre;

        store.transactions = [];

        store.fixes.forEach(cat => cat.items.forEach(it => it.done = false));
        store.variables.forEach(cat => cat.items.forEach(it => it.done = false));

        render();

        // désactive loader
        document.getElementById('ritualLoader').style.display = 'none';
        document.body.classList.remove('no-anim');

    }, 1200); // durée du rituel (1.2s)
}
/* ================= SYSTEME D'INVOCATION & SAUVEGARDE ================= */

function showInternalSave() {
    const box = document.getElementById('internalSaveBox');
    const area = document.getElementById('saveCodeArea');
    // On transforme les données en code secret (Base64)
    area.value = btoa(JSON.stringify(store)); 
    box.style.display = 'block';
}

function copyCode() {
    const area = document.getElementById('saveCodeArea');
    area.select();
    document.execCommand('copy');
    alert("Le rituel est gravé dans ton presse-papier !");
}

function openImportModal() {
    document.getElementById('importModal').style.display = 'flex';
}

function closeImportModal() {
    document.getElementById('importModal').style.display = 'none';
}

function confirmImport() {
    const code = document.getElementById('importCodeArea').value;
    try {
        const decoded = JSON.parse(atob(code));
        if (confirm("Invoquer ces données écrasera ton sanctuaire actuel. Continuer ?")) {
            store = decoded;
            save(); // Sauvegarde dans le localStorage
            location.reload(); // Recharge pour tout mettre à jour
        }
    } catch (e) {
        alert("Le code d'invocation est corrompu ou incomplet...");
    }
}

</script>
